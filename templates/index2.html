<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeChat — {{ username }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="/static/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .app {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: row;
        }

        /* Левая панель */
        .leftbar {
            flex: 0 0 280px;
            background-color: #2c2f33;
            display: flex;
            flex-direction: column;
            height: 100%;
            border-right: 1px solid #555;
        }

        /* Header левой панели - фиксированная высота 60px */
        .leftbar-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background-color: #23272a;
            border-bottom: 1px solid #1a1d21;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logout-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: #cc0000;
        }

        /* Контейнер для списка чатов - скроллится */
        .chats-container {
            flex: 1;
            overflow-y: auto;
            background-color: #2c2f33;
        }

        .chat-item {
            padding: 12px 16px;
            border-bottom: 1px solid #40444b;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #40444b;
        }

        .chat-item.active {
            background: #40444b;
            border-left: 3px solid #5865f2;
        }

        .chat-item h2 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .chat-item p {
            font-size: 0.75rem;
            font-weight: 400;
            color: #b9bbbe;
            margin: 0;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Информация о пользователе - фиксированная высота 60px */
        .user-info {
            height: 60px;
            padding: 0 16px;
            background-color: #23272a;
            border-top: 1px solid #1a1d21;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: #5865f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 1rem;
        }

        .user-name {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Правая панель - окно чата */
        .chatwindow {
            flex: 1;
            background-color: #36393f;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Header чата - фиксированная высота 60px */
        .chat-header {
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 20px;
            background-color: #2e3136;
            border-bottom: 1px solid #202225;
            flex-shrink: 0;
        }

        .chat-header h2 {
            font-weight: 600;
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 0.75rem;
            color: #b9bbbe;
            margin: 0;
        }

        /* Область сообщений - скроллится */
        .chat-messages {
            flex: 1;
            background-color: #36393f;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            flex-direction: column;
        }

        .message-header {
            display: flex;
            gap: 8px;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .message-nick {
            font-weight: 600;
            color: #5865f2;
            font-size: 0.9rem;
        }

        .message-time {
            font-size: 0.7rem;
            color: #8e9297;
        }

        .message-text {
            color: #dcddde;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .system-message {
            text-align: center;
            color: #8e9297;
            font-size: 0.8rem;
            margin: 8px 0;
            font-style: italic;
        }

        /* Область ввода - фиксированная высота 60px */
        .chat-input-area {
            flex-shrink: 0;
            background-color: #2e3136;
            border-top: 1px solid #202225;
            height: 60px;
        }

        .chat-input-wrapper {
            display: flex;
            align-items: center;
            height: 100%;
            padding: 0;
        }

        .chat-input {
            flex: 1;
            background-color: #40444b;
            border: none;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            line-height: 1.4;
            outline: none;
            height: 100%;
            padding: 0 15px;
        }

        .chat-input:focus {
            background-color: #4e535c;
        }

        .chat-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-input::placeholder {
            color: #8e9297;
        }

        .send-btn {
            background-color: #5865f2;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 60px;
            transition: background 0.2s;
        }

        .send-btn svg {
            width: 24px;
            height: 24px;
            stroke: white;
            stroke-width: 2;
        }

        .send-btn:hover:not(:disabled) {
            background-color: #4752c4;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Скроллбар */
        .chats-container::-webkit-scrollbar,
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chats-container::-webkit-scrollbar-track,
        .chat-messages::-webkit-scrollbar-track {
            background: #2c2f33;
        }

        .chats-container::-webkit-scrollbar-thumb,
        .chat-messages::-webkit-scrollbar-thumb {
            background: #202225;
            border-radius: 4px;
        }

        .chats-container::-webkit-scrollbar-thumb:hover,
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #40444b;
        }

        @media (max-width: 640px) {
            .leftbar {
                flex: 0 0 240px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="leftbar">
        <div class="leftbar-header">
            <span class="logo-text">FreeChat</span>
            <a href="/logout" class="logout-btn">Выйти</a>
        </div>

        <div class="chats-container" id="chats-list">
            <div style="text-align: center; color: #b9bbbe; padding: 20px;">
                Загрузка чатов...
            </div>
        </div>

        <div class="user-info">
            <div class="user-avatar">
                {{ username[0].upper() }}
            </div>
            <div class="user-name">
                {{ username }}
            </div>
        </div>
    </div>

    <div class="chatwindow">
        <div class="chat-header" id="chat-header">
            <h2>💬 Выберите чат</h2>
            <p></p>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="system-message">
                Выберите чат слева, чтобы начать общение
            </div>
        </div>

        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <input type="text" class="chat-input" id="message-input" placeholder="Введите сообщение..." disabled>
                <button class="send-btn" id="send-btn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const socket = io();
    let currentChatId = null;
    let currentChatData = null;
    const username = "{{ username }}";
    const initialChats = {{ chats | tojson }};

    // Функция обновления последнего сообщения в списке чатов
    function updateLastMessage(chatId, lastMessage) {
        const chatElements = document.querySelectorAll('.chat-item');
        for (let element of chatElements) {
            if (element.dataset.chatId == chatId) {
                const pElement = element.querySelector('p');
                if (pElement) {
                    pElement.textContent = lastMessage;
                }
                break;
            }
        }
    }

    // Подключение к Socket.IO
    socket.on('connect', () => {
        console.log('Connected to server');
        socket.emit('set_username', { username: username });
    });

    // Обновление последнего сообщения от сервера
    socket.on('update_last_message', (data) => {
        updateLastMessage(data.chat_id, data.last_message);
    });

    // Получение списка чатов
    socket.on('chats_list', (chats) => {
        renderChatsList(chats);
    });

    function renderChatsList(chats) {
        const chatsList = document.getElementById('chats-list');
        chatsList.innerHTML = '';

        chats.forEach(chat => {
            const chatDiv = document.createElement('div');
            chatDiv.className = 'chat-item';
            if (currentChatId === chat.id) chatDiv.classList.add('active');
            chatDiv.dataset.chatId = chat.id;
            chatDiv.innerHTML = `
                <h2>${escapeHtml(chat.name)}</h2>
                <p>${escapeHtml(chat.last_message || 'Нет сообщений')}</p>
            `;
            chatDiv.onclick = () => joinChat(chat.id, chat.name, chat.description);
            chatsList.appendChild(chatDiv);
        });
    }

    // Присоединение к чату
    function joinChat(chatId, chatName, chatDescription) {
        if (currentChatId === chatId) return;

        currentChatId = chatId;
        currentChatData = { name: chatName, description: chatDescription };

        // Обновляем хедер чата с описанием
        const chatHeader = document.getElementById('chat-header');
        chatHeader.innerHTML = `
            <h2>💬 ${escapeHtml(chatName)}</h2>
            <p>${escapeHtml(chatDescription || 'Описание отсутствует')}</p>
        `;

        // Активируем поле ввода
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();

        // Обновляем активный класс в списке
        document.querySelectorAll('.chat-item').forEach(item => {
            item.classList.remove('active');
        });
        const activeItem = document.querySelector(`.chat-item[data-chat-id="${chatId}"]`);
        if (activeItem) activeItem.classList.add('active');

        socket.emit('join_chat', { chat_id: chatId });
    }

    // Получение истории чата
    socket.on('chat_history', (data) => {
        if (data.chat_id === currentChatId) {
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.innerHTML = '';

            if (data.messages.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'system-message';
                emptyDiv.innerText = 'История сообщений пуста. Напишите первое сообщение!';
                messagesContainer.appendChild(emptyDiv);
            } else {
                data.messages.forEach(msg => {
                    addMessageToChat(msg.nick, msg.message, msg.timestamp);
                });
            }

            scrollToBottom();
        }
    });

    // Новое сообщение
    socket.on('new_message', (data) => {
        if (data.chat_id === currentChatId) {
            addMessageToChat(data.nick, data.message, data.timestamp);
            scrollToBottom();
        }
        // Обновляем последнее сообщение в списке чатов
        const shortMessage = data.message.length > 30 ? data.message.substring(0, 27) + '...' : data.message;
        updateLastMessage(data.chat_id, `${data.nick}: ${shortMessage}`);
    });

    // Уведомление о присоединении
    socket.on('user_joined', (data) => {
        if (data.chat_id === currentChatId) {
            addSystemMessage(`${data.username} присоединился к чату`);
        }
    });

    // Добавление сообщения в чат
    function addMessageToChat(nick, message, timestamp) {
        const messagesContainer = document.getElementById('chat-messages');

        // Удаляем системное сообщение о пустой истории если оно есть
        if (messagesContainer.children.length === 1 &&
            messagesContainer.children[0].classList.contains('system-message') &&
            messagesContainer.children[0].innerText === 'История сообщений пуста. Напишите первое сообщение!') {
            messagesContainer.innerHTML = '';
        }

        const messageDiv = document.createElement('div');
        messageDiv.className = 'message';

        let timeStr = '';
        if (timestamp) {
            const date = new Date(timestamp);
            timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } else {
            timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        messageDiv.innerHTML = `
            <div class="message-header">
                <span class="message-nick">${escapeHtml(nick)}</span>
                <span class="message-time">${timeStr}</span>
            </div>
            <div class="message-text">${escapeHtml(message)}</div>
        `;

        messagesContainer.appendChild(messageDiv);
    }

    // Системное сообщение
    function addSystemMessage(text) {
        const messagesContainer = document.getElementById('chat-messages');
        const sysDiv = document.createElement('div');
        sysDiv.className = 'system-message';
        sysDiv.innerText = text;
        messagesContainer.appendChild(sysDiv);
    }

    // Отправка сообщения
    function sendMessage() {
        const input = document.getElementById('message-input');
        const message = input.value.trim();

        if (message && currentChatId !== null) {
            socket.emit('send_message', { message: message });
            input.value = '';
            input.focus();
        }
    }

    // Прокрутка вниз
    function scrollToBottom() {
        const container = document.getElementById('chat-messages');
        container.scrollTop = container.scrollHeight;
    }

    // Escape HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Инициализация списка чатов из начальных данных
    renderChatsList(initialChats);

    // Обработчики событий
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
